# Build petrivet-wasm + petrivet-viz and deploy to GitHub Pages (project site).
#
# After the first successful run, enable: Settings → Pages → Build and deployment →
# Source: GitHub Actions (if prompted).

name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package
        run: cd petrivet-wasm && wasm-pack build --target web --out-dir pkg

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: petrivet-viz/package-lock.json

      - name: Install & build frontend
        env:
          # Project Pages live under https://<user>.github.io/<repo>/
          VITE_BASE: /${{ github.event.repository.name }}/
        run: |
          cd petrivet-viz
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: petrivet-viz/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
